<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon"><i class="fas fa-comment-dots"></i></div>
        <span class="sidebar-brand-text">Chat App</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-btn active" title="Yeni Sohbet">
          <i class="fas fa-plus"></i>
          <span>New Chat</span>
        </button>
        <button class="nav-btn" title="Ara" id="searchToggleBtn">
          <i class="fas fa-search"></i>
          <span>Search</span>
        </button>
        <button class="nav-btn" title="Sohbet Geçmişi" id="historyToggleBtn">
          <i class="fas fa-clock-rotate"></i>
          <span>History</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <button class="nav-btn danger" title="Geçmişi Temizle" id="historyClearBtn">
          <i class="fas fa-trash-can"></i>
          <span>Clear History</span>
        </button>
      </div>
    </aside>

    <aside class="history-panel" id="historyPanel">
      <div class="history-header">
        <h3 class="history-title">Sohbet Geçmişi</h3>
        <button class="history-close" id="historyClose" title="Kapat"><i class="fas fa-times"></i></button>
      </div>
      <div class="history-list" id="historyList"></div>
    </aside>

    <div class="search-panel-overlay" id="searchOverlay"></div>
    <aside class="search-panel" id="searchPanel">
      <div class="search-panel-header">
        <i class="fas fa-search"></i>
        <input type="text" class="search-panel-input" id="searchPanelInput" placeholder="Search conversations..." autocomplete="off" />
        <button class="search-panel-close" id="searchPanelClose"><i class="fas fa-times"></i></button>
      </div>
      <div class="search-panel-results" id="searchPanelResults"></div>
    </aside>

    <main class="main">
      <header class="chat-header">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <h1 class="app-title">Chat App</h1>
        <div class="header-spacer"></div>
      </header>

      <section class="chat-messages" id="chatMessages">
        <div class="typing-indicator" id="typingIndicator">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      </section>

      <footer class="chat-input-area">
        <div class="input-wrapper">
          <div class="model-bar">
            <button class="model-bar-btn" id="modelBarBtn">
              <i class="fas fa-cube"></i>
              <span id="modelBarLabel">GPT-4.1 Mini</span>
              <i class="fas fa-chevron-down"></i>
            </button>
            <div class="model-bar-dropdown" id="modelBarDropdown"></div>
          </div>
          <button class="icon-btn" id="fileBtn" title="Dosya Yükle"><i class="fas fa-paperclip"></i></button>
          <input type="text" class="msg-input" id="msgInput" placeholder="Send a message..." autofocus />
          <button class="send-btn" id="sendBtn" title="Gönder"><i class="fas fa-arrow-up"></i></button>
        </div>
        <input type="file" id="fileInput" hidden />
      </footer>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
